name: DREC Scheduler Dry Run

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"
    - cron: "30 18 * * *"

permissions:
  contents: read

concurrency:
  group: drec-scheduler-dry-run
  cancel-in-progress: false

jobs:
  dry-run-jobs:
    runs-on: ubuntu-latest
    env:
      DREC_API_BASE_URL: ${{ vars.DREC_API_BASE_URL || 'https://drec-content-os-api.fly.dev' }}
      DREC_ACCESS_TOKEN: ${{ secrets.DREC_ACCESS_TOKEN }}
    steps:
      - name: Skip when access token is missing
        if: ${{ env.DREC_ACCESS_TOKEN == '' }}
        run: |
          echo "DREC_ACCESS_TOKEN is not configured. Skipping dry-run scheduler checks."

      - name: Dry run due Meta publishing
        if: ${{ env.DREC_ACCESS_TOKEN != '' }}
        run: |
          curl --fail --silent --show-error --retry 3 --retry-delay 10 --max-time 90 \
            --request POST \
            --header "X-DREC-Access-Token: ${DREC_ACCESS_TOKEN}" \
            "${DREC_API_BASE_URL}/jobs/meta-publishing?dry_run=true&channel=all"

      - name: Dry run nightly Meta metrics
        if: ${{ env.DREC_ACCESS_TOKEN != '' && (github.event_name == 'workflow_dispatch' || github.event.schedule == '30 18 * * *') }}
        run: |
          curl --fail --silent --show-error --retry 3 --retry-delay 10 --max-time 90 \
            --request POST \
            --header "X-DREC-Access-Token: ${DREC_ACCESS_TOKEN}" \
            "${DREC_API_BASE_URL}/jobs/nightly-meta-metrics?dry_run=true&limit=25&rollup=true"

      - name: Check automation and risk gates
        if: ${{ env.DREC_ACCESS_TOKEN != '' }}
        run: |
          curl --fail --silent --show-error --retry 3 --retry-delay 10 --max-time 90 \
            --header "X-DREC-Access-Token: ${DREC_ACCESS_TOKEN}" \
            "${DREC_API_BASE_URL}/automation/status"
          curl --fail --silent --show-error --retry 3 --retry-delay 10 --max-time 90 \
            --header "X-DREC-Access-Token: ${DREC_ACCESS_TOKEN}" \
            "${DREC_API_BASE_URL}/operations/risk-audit"

      - name: Record scheduler heartbeat
        if: ${{ env.DREC_ACCESS_TOKEN != '' }}
        run: |
          curl --fail --silent --show-error --retry 3 --retry-delay 10 --max-time 90 \
            --request POST \
            --header "X-DREC-Access-Token: ${DREC_ACCESS_TOKEN}" \
            "${DREC_API_BASE_URL}/operations/scheduler-heartbeat"

      - name: Write scheduler run summary
        if: ${{ always() }}
        run: |
          {
            echo "## DREC Scheduler Dry Run"
            echo ""
            echo "- API: ${DREC_API_BASE_URL}"
            echo "- Event: ${GITHUB_EVENT_NAME}"
            echo "- Schedule: ${GITHUB_EVENT_SCHEDULE:-manual}"
            echo "- Token configured: $([ -n "${DREC_ACCESS_TOKEN}" ] && echo yes || echo no)"
            echo "- Safety: dry-run only; this workflow does not publish live Meta posts."
            echo ""
            echo "If heartbeat stays stale in DREC Content OS, confirm the repository secret \`DREC_ACCESS_TOKEN\` is current and admin-scoped, then run this workflow manually once."
          } >> "$GITHUB_STEP_SUMMARY"
