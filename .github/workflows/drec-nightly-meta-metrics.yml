name: DREC Nightly Meta Metrics

on:
  workflow_dispatch:
  schedule:
    - cron: "30 18 * * *"

permissions:
  contents: read

concurrency:
  group: drec-nightly-meta-metrics
  cancel-in-progress: false

jobs:
  nightly-meta-metrics:
    runs-on: ubuntu-latest
    env:
      DREC_API_BASE_URL: ${{ vars.DREC_API_BASE_URL || 'https://drec-content-os-api.fly.dev' }}
      DREC_ACCESS_TOKEN: ${{ secrets.DREC_ACCESS_TOKEN }}
      DREC_ENABLE_REAL_META_METRICS: ${{ vars.DREC_ENABLE_REAL_META_METRICS || 'false' }}
    steps:
      - name: Skip when access token is missing
        if: ${{ env.DREC_ACCESS_TOKEN == '' }}
        run: |
          echo "DREC_ACCESS_TOKEN is not configured. Skipping nightly Meta metrics."

      - name: Choose metrics mode
        if: ${{ env.DREC_ACCESS_TOKEN != '' }}
        run: |
          if [ "${DREC_ENABLE_REAL_META_METRICS}" = "true" ]; then
            echo "DREC_METRICS_DRY_RUN=false" >> "$GITHUB_ENV"
            echo "DREC_METRICS_MODE=live_metrics" >> "$GITHUB_ENV"
          else
            echo "DREC_METRICS_DRY_RUN=true" >> "$GITHUB_ENV"
            echo "DREC_METRICS_MODE=dry_run" >> "$GITHUB_ENV"
          fi

      - name: Check automation gate
        if: ${{ env.DREC_ACCESS_TOKEN != '' }}
        run: |
          curl --fail --silent --show-error --retry 3 --retry-delay 10 --max-time 90 \
            --header "X-DREC-Access-Token: ${DREC_ACCESS_TOKEN}" \
            "${DREC_API_BASE_URL}/automation/status"

      - name: Check Meta readiness before live metrics
        if: ${{ env.DREC_ACCESS_TOKEN != '' }}
        run: |
          if [ "${DREC_METRICS_DRY_RUN}" != "false" ]; then
            echo "Dry-run metrics mode selected. Skipping live Meta readiness precheck."
            exit 0
          fi
          curl --fail --silent --show-error --retry 3 --retry-delay 10 --max-time 90 \
            --header "X-DREC-Access-Token: ${DREC_ACCESS_TOKEN}" \
            "${DREC_API_BASE_URL}/meta/readiness"

      - name: Prove metrics dry run before live ingestion
        if: ${{ env.DREC_ACCESS_TOKEN != '' }}
        run: |
          curl --fail --silent --show-error --retry 3 --retry-delay 10 --max-time 90 \
            --request POST \
            --header "X-DREC-Access-Token: ${DREC_ACCESS_TOKEN}" \
            --output metrics-dry-run.json \
            "${DREC_API_BASE_URL}/jobs/nightly-meta-metrics?dry_run=true&limit=25&rollup=true"
          if [ "${DREC_METRICS_DRY_RUN}" = "false" ]; then
            if ! jq -e '.ready == true' metrics-dry-run.json >/dev/null; then
              echo "Live metrics ingestion blocked because the dry-run payload is not ready."
              jq -r '.blockers[]? // empty' metrics-dry-run.json
              exit 1
            fi
          fi

      - name: Run nightly Meta metrics job
        if: ${{ env.DREC_ACCESS_TOKEN != '' }}
        run: |
          curl --fail --silent --show-error --retry 3 --retry-delay 10 --max-time 90 \
            --request POST \
            --header "X-DREC-Access-Token: ${DREC_ACCESS_TOKEN}" \
            --output metrics-job-result.json \
            "${DREC_API_BASE_URL}/jobs/nightly-meta-metrics?dry_run=${DREC_METRICS_DRY_RUN}&limit=25&rollup=true"

      - name: Record metrics scheduler heartbeat
        if: ${{ env.DREC_ACCESS_TOKEN != '' }}
        run: |
          curl --fail --silent --show-error --retry 3 --retry-delay 10 --max-time 90 \
            --request POST \
            --header "X-DREC-Access-Token: ${DREC_ACCESS_TOKEN}" \
            "${DREC_API_BASE_URL}/operations/scheduler-heartbeat?workflow=drec-nightly-meta-metrics&mode=${DREC_METRICS_MODE}"

      - name: Write metrics run summary
        if: ${{ always() }}
        run: |
          {
            echo "## DREC Nightly Meta Metrics"
            echo ""
            echo "- API: ${DREC_API_BASE_URL}"
            echo "- Mode: ${DREC_METRICS_MODE:-not_selected}"
            echo "- Dry run: ${DREC_METRICS_DRY_RUN:-not_selected}"
            echo "- Token configured: $([ -n "${DREC_ACCESS_TOKEN}" ] && echo yes || echo no)"
            if [ -f metrics-dry-run.json ]; then
              echo "- Dry-run ready: $(jq -r '.ready // false' metrics-dry-run.json)"
              echo "- Planned requests: $(jq -r '(.planned_requests // []) | length' metrics-dry-run.json)"
              echo "- Dry-run blockers: $(jq -r '(.blockers // []) | join("; ")' metrics-dry-run.json)"
            fi
            if [ -f metrics-job-result.json ]; then
              echo "- Job mode: $(jq -r '.mode // "unknown"' metrics-job-result.json)"
              echo "- Inserted rows: $(jq -r '(.inserted // []) | length' metrics-job-result.json)"
            fi
            echo "- Safety: live metrics require both GitHub variable \`DREC_ENABLE_REAL_META_METRICS=true\` and Fly secret \`META_ENABLE_METRICS_JOB=true\`."
            echo "- Live guard: real ingestion only runs after the dry-run payload reports \`ready=true\`."
          } >> "$GITHUB_STEP_SUMMARY"
