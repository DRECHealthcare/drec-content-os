name: DREC Project Completion Watch

on:
  workflow_dispatch:
  schedule:
    # Daily 09:45 MYT after the morning closeout checks.
    - cron: "45 1 * * *"

permissions:
  contents: read

concurrency:
  group: drec-project-completion-watch
  cancel-in-progress: false

jobs:
  completion-watch:
    runs-on: ubuntu-latest
    env:
      DREC_API_BASE_URL: ${{ vars.DREC_API_BASE_URL || 'https://drec-content-os-api.fly.dev' }}
      DREC_WEB_URL: ${{ vars.DREC_WEB_URL || 'https://drec-content-os.vercel.app' }}
      DREC_ACCESS_TOKEN: ${{ secrets.DREC_ACCESS_TOKEN }}
      DREC_ACTOR: github-project-completion-watch
    steps:
      - name: Skip when access token is missing
        if: ${{ env.DREC_ACCESS_TOKEN == '' }}
        run: |
          echo "DREC_ACCESS_TOKEN is not configured. Skipping project completion watch."

      - name: Check out repository
        if: ${{ env.DREC_ACCESS_TOKEN != '' }}
        uses: actions/checkout@v4

      - name: Set up Node
        if: ${{ env.DREC_ACCESS_TOKEN != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Check project completion audit
        if: ${{ env.DREC_ACCESS_TOKEN != '' }}
        run: |
          curl --fail --silent --show-error --retry 3 --retry-delay 10 --max-time 120 \
            --header "X-DREC-Access-Token: ${DREC_ACCESS_TOKEN}" \
            "${DREC_API_BASE_URL}/operations/project-completion-audit" \
            | tee project-completion-audit.json

      - name: Check project unblock board
        if: ${{ env.DREC_ACCESS_TOKEN != '' }}
        run: |
          curl --fail --silent --show-error --retry 3 --retry-delay 10 --max-time 120 \
            --header "X-DREC-Access-Token: ${DREC_ACCESS_TOKEN}" \
            "${DREC_API_BASE_URL}/operations/project-unblock-board" \
            | tee project-unblock-board.json

      - name: Check workflow status
        if: ${{ env.DREC_ACCESS_TOKEN != '' }}
        run: |
          curl --fail --silent --show-error --retry 3 --retry-delay 10 --max-time 120 \
            --header "X-DREC-Access-Token: ${DREC_ACCESS_TOKEN}" \
            "${DREC_API_BASE_URL}/workflow/status" \
            | tee workflow-status.json

      - name: Check launch readiness
        if: ${{ env.DREC_ACCESS_TOKEN != '' }}
        run: |
          curl --fail --silent --show-error --retry 3 --retry-delay 10 --max-time 120 \
            --header "X-DREC-Access-Token: ${DREC_ACCESS_TOKEN}" \
            "${DREC_API_BASE_URL}/operations/launch-readiness" \
            | tee launch-readiness.json

      - name: Extract completion highlights
        if: ${{ env.DREC_ACCESS_TOKEN != '' }}
        run: |
          {
            echo "### Current Completion"
            echo ""
            echo "- Overall: $(jq -r '.completion.percent // \"unknown\"' project-completion-audit.json)%"
            echo "- First cycle: $(jq -r '.completion.first_cycle_percent // \"unknown\"' project-completion-audit.json)%"
            echo "- Readiness: $(jq -r '.readiness // \"unknown\"' project-completion-audit.json)"
            echo "- Next requirement: $(jq -r '.completion.next_requirement // .next_actions[0] // \"No next requirement reported\"' project-completion-audit.json)"
            echo "- Unblock board: $(jq -r '(.ready_count // 0 | tostring) + \" ready / \" + (.blocked_count // 0 | tostring) + \" blocked\"' project-unblock-board.json)"
            echo "- Launch status: $(jq -r '.overall_status // \"unknown\"' launch-readiness.json)"
            echo ""
            echo "Top blockers:"
            jq -r '(.completion.blockers // .next_actions // [])[:5][]? | \"- \" + .' project-completion-audit.json
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Run full live smoke
        if: ${{ env.DREC_ACCESS_TOKEN != '' }}
        run: |
          node scripts/smoke-live.mjs | tee live-smoke.log

      - name: Record project completion watch heartbeat
        if: ${{ env.DREC_ACCESS_TOKEN != '' }}
        run: |
          curl --fail --silent --show-error --retry 3 --retry-delay 10 --max-time 90 \
            --request POST \
            --header "X-DREC-Access-Token: ${DREC_ACCESS_TOKEN}" \
            "${DREC_API_BASE_URL}/operations/project-completion-watch-heartbeat?workflow=drec-project-completion-watch&mode=read_only_completion_watch" \
            | tee project-completion-watch-heartbeat.json

      - name: Write completion watch summary
        if: ${{ always() }}
        run: |
          {
            echo "## DREC Project Completion Watch"
            echo ""
            echo "- API: ${DREC_API_BASE_URL}"
            echo "- Web: ${DREC_WEB_URL}"
            echo "- Event: ${GITHUB_EVENT_NAME}"
            echo "- Schedule: ${GITHUB_EVENT_SCHEDULE:-manual}"
            echo "- Token configured: $([ -n "${DREC_ACCESS_TOKEN}" ] && echo yes || echo no)"
            echo "- Safety: read-only completion checks only; this workflow does not approve, import, queue, schedule, publish, update Notion, store secrets, or call Meta."
            echo "- Evidence: records a project-completion-watch heartbeat only after completion, unblock, workflow, launch, and full live smoke checks pass."
            echo ""
            echo "Checks:"
            echo "- /operations/project-completion-audit"
            echo "- /operations/project-unblock-board"
            echo "- /workflow/status"
            echo "- /operations/launch-readiness"
            echo "- node scripts/smoke-live.mjs"
            echo "- /operations/project-completion-watch-heartbeat"
          } >> "$GITHUB_STEP_SUMMARY"
